<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyHub - Student Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

  <canvas id="particles-canvas"></canvas>

  <header>
    <div class="logo">📚 StudyHub</div>
    <nav style="display: flex; gap: 15px; align-items: center;">
      <span id="userNameDisplay" style="margin-right: 10px; font-weight: 600; color: #fff; font-size: 0.95rem;"></span>
      <button class="btn btn-secondary" onclick="logout()" style="padding: 8px 16px; font-size: 0.9rem;">&#8592; Home</button>
    </nav>
  </header>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
      <h1 style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">My Classes</h1>
      <input type="text" id="searchNotes" class="input-field" style="width: 280px; margin-bottom: 0;" placeholder="🔍 Search notes..." onkeyup="handleSearch()">
    </div>

    <!-- Active Announcements -->
    <div id="announcementArea" style="margin-bottom: 30px;"></div>

    <!-- Subject Grid — 3 per row with icons -->
    <div class="grid-3" id="subjectsGrid">
      <!-- Generated via JS -->
    </div>

    <!-- Subject Detail View -->
    <div id="subjectDetailView" class="hidden glass-card" style="margin-top: 30px;">
      <button class="btn btn-secondary" onclick="backToSubjects()" style="margin-bottom: 20px;">&larr; Back to Subjects</button>
      
      <h2 id="currentSubjectTitle" style="color: var(--primary-color); display: flex; align-items: center; gap: 12px;"><span id="currentSubjectIcon" style="font-size: 2rem;"></span><span id="currentSubjectName"></span></h2>

      <!-- Subject-Specific Reminders -->
      <div id="subjectRemindersArea" style="margin-bottom: 25px;"></div>
      
      <div class="grid-2 notes-section">
        <!-- Official Notes -->
        <div>
          <h3 class="notes-header">👨‍🏫 Official Notes</h3>
          <div id="officialNotesList">
            <!-- Notes here -->
          </div>
        </div>
        
        <!-- Private Notes -->
        <div>
          <h3 class="notes-header">👨‍🎓 My Personal Notes
            <button class="btn" style="padding: 4px 10px; font-size: 0.8rem;" onclick="document.getElementById('uploadPersonalModal').classList.remove('hidden')">+ Add</button>
          </h3>
          <div id="personalNotesList">
            <!-- Notes here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Upload Personal Note Modal -->
  <div id="uploadPersonalModal" class="hidden modal-overlay">
    <div class="glass-card modal-content">
      <h3 style="margin-bottom: 5px;">Upload Personal Note</h3>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">This will only be visible to you.</p>
      
      <form id="uploadPersonalForm">
        <label>Note Title</label>
        <input type="text" id="pNoteTitle" class="input-field" required>
        
        <label>Google Drive Link (URL)</label>
        <input type="url" id="pNoteFileUrl" class="input-field" required placeholder="https://drive.google.com/file/d/...">
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button type="submit" class="btn" style="flex:1;">Upload Link</button>
          <button type="button" class="btn btn-secondary" style="flex:1;" onclick="document.getElementById('uploadPersonalModal').classList.add('hidden')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Search Results Modal -->
  <div id="searchResultsView" class="hidden glass-card" style="margin-top: 30px;">
      <h2 style="color: var(--primary-color); margin-bottom: 20px;">🔍 Search Results</h2>
      <div id="searchResultsList"></div>
  </div>

  <!-- View File Modal -->
  <div id="viewFileModal" class="hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:flex; flex-direction:column; justify-content:flex-start; align-items:center; z-index: 3000; padding: 12px 16px;">
    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: rgba(255,255,255,0.06); padding: 10px 16px; border-radius: 10px;">
      <h3 id="viewFileTitle" style="color: white; font-size: 1.1rem; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%;">Note Title</h3>
      <button class="btn btn-danger" style="padding: 8px 18px; font-size: 0.9rem;" onclick="closeViewer()">✕ Close</button>
    </div>
    <iframe id="viewFileFrame" style="width: 100%; height: calc(100vh - 80px); background: white; border-radius: 10px; border: none;" frameborder="0"></iframe>
  </div>

  <script src="app.js"></script>
  <script>
    // ===== PARTICLES =====
    (function() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      class P {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2 + 0.5;
          this.speedX = (Math.random() - 0.5) * 0.3;
          this.speedY = (Math.random() - 0.5) * 0.3;
          this.opacity = Math.random() * 0.3 + 0.1;
          this.hue = Math.random() > 0.5 ? 245 : 340;
        }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(); }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fillStyle = `hsla(${this.hue},80%,70%,${this.opacity})`; ctx.fill(); }
      }
      for (let i = 0; i < 35; i++) particles.push(new P());
      function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
      animate();
    })();

    const user = requireAuth('student');
    let currentSubject = '';

    document.getElementById('userNameDisplay').textContent = '👋 Hello, ' + user.name;

    async function renderAnnouncements() {
      const announcements = await getData(STORAGE_KEYS.ANNOUNCEMENTS);
      const area = document.getElementById('announcementArea');
      if (announcements.length === 0) {
        area.innerHTML = '';
        return;
      }
      
      const latest = announcements[announcements.length - 1];
      area.innerHTML = `
        <div style="background: linear-gradient(135deg, rgba(108, 99, 255, 0.1), rgba(138,43,226,0.08)); border-left: 4px solid var(--primary-color); padding: 16px 20px; border-radius: 12px;">
          <strong style="color: var(--primary-color);">📢 Latest Announcement:</strong>
          <p style="margin-top: 6px; line-height: 1.6;">${latest.text}</p>
        </div>
      `;
    }

    async function renderSubjects() {
      const subjects = await getSubjects();
      const grid = document.getElementById('subjectsGrid');
      grid.innerHTML = subjects.map(subj => `
        <div class="glass-card subject-card" onclick="openSubject('${subj.name.replace(/'/g, "\\'")}')">
          <div class="subject-icon">${subj.icon}</div>
          <h3>${subj.name}</h3>
          <p style="color: var(--text-muted); font-size: 0.85rem;">${subj.description || 'View Notes & Materials'}</p>
          <div style="margin-top: 12px;">
            <span class="btn" style="padding: 6px 16px; font-size: 0.8rem;">Open →</span>
          </div>
        </div>
      `).join('');
    }

    async function openSubject(subject) {
      currentSubject = subject;
      const subjData = await getSubjectByName(subject);
      document.getElementById('subjectsGrid').classList.add('hidden');
      document.getElementById('searchResultsView').classList.add('hidden');
      document.getElementById('subjectDetailView').classList.remove('hidden');
      document.getElementById('currentSubjectIcon').textContent = subjData.icon;
      document.getElementById('currentSubjectName').textContent = subject;
      await renderNotes();
      await renderSubjectReminders(subject);
    }

    function backToSubjects() {
      currentSubject = '';
      document.getElementById('subjectDetailView').classList.add('hidden');
      document.getElementById('searchResultsView').classList.add('hidden');
      document.getElementById('subjectsGrid').classList.remove('hidden');
      document.getElementById('searchNotes').value = '';
    }

    async function renderNotes() {
      if(!currentSubject) return;
      const allNotes = await getData(STORAGE_KEYS.NOTES);
      
      const officialNotes = allNotes.filter(n => n.subject === currentSubject && n.type === 'official');
      const personalNotes = allNotes.filter(n => n.subject === currentSubject && n.type === 'personal' && n.uploadedBy === user.id);

      const offList = document.getElementById('officialNotesList');
      const perList = document.getElementById('personalNotesList');

      const renderNoteHtml = (n, idx) => `
        <div class="note-item ${n.type === 'personal' ? 'personal' : ''}">
          <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;">
             <strong>📄 ${n.title}</strong>
             <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">By: ${n.uploaderName} • ${new Date(n.date).toLocaleDateString()}</div>
          </div>
          <div style="display:flex; gap: 5px; flex-shrink: 0;">
            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="downloadFile('${n.id}')">Open</button>
            ${n.type === 'personal' ? `<button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.8rem;" onclick="deletePersonalNote('${n.id}')">Delete</button>` : ''}
          </div>
        </div>
      `;

      offList.innerHTML = officialNotes.length ? officialNotes.map(renderNoteHtml).join('') : '<p style="color:var(--text-muted); font-size: 0.9rem;">No official notes yet.</p>';
      perList.innerHTML = personalNotes.length ? personalNotes.map(renderNoteHtml).join('') : '<p style="color:var(--text-muted); font-size: 0.9rem;">You haven\'t uploaded any personal notes for this subject.</p>';
    }

    async function handleSearch() {
        const query = document.getElementById('searchNotes').value.toLowerCase();
        if(query.trim() === '') {
            if(currentSubject) await openSubject(currentSubject);
            else backToSubjects();
            return;
        }

        document.getElementById('subjectsGrid').classList.add('hidden');
        document.getElementById('subjectDetailView').classList.add('hidden');
        document.getElementById('searchResultsView').classList.remove('hidden');

        const allNotes = await getData(STORAGE_KEYS.NOTES);
        const visibleNotes = allNotes.filter(n => n.type === 'official' || (n.type === 'personal' && n.uploadedBy === user.id));
        
        const results = visibleNotes.filter(n => n.title.toLowerCase().includes(query) || n.subject.toLowerCase().includes(query));
        
        const resultsArea = document.getElementById('searchResultsList');
        if(results.length === 0){
            resultsArea.innerHTML = '<p style="color: var(--text-muted);">No matching notes found.</p>';
            return;
        }

        resultsArea.innerHTML = results.map(n => `
            <div class="note-item ${n.type === 'personal' ? 'personal' : ''}" style="margin-bottom: 10px;">
                <div style="flex: 1;">
                    <strong>📄 ${n.title}</strong>
                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">
                        Subject: ${n.subject} • Type: ${n.type.toUpperCase()}
                    </div>
                </div>
                <div style="display:flex; gap: 5px;">
                    <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="downloadFile('${n.id}')">Open</button>
                    ${n.type === 'personal' ? `<button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.8rem;" onclick="deletePersonalNote('${n.id}')">Delete</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    // Upload Personal Note
    document.getElementById('uploadPersonalForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const title = document.getElementById('pNoteTitle').value.trim();
      const fileUrl = document.getElementById('pNoteFileUrl').value.trim();
      
      if (!fileUrl) return;

      try {
        const newNote = {
          id: Date.now().toString(),
          title: title,
          subject: currentSubject,
          type: 'personal',
          uploadedBy: user.id,
          uploaderName: user.name,
          date: Date.now(),
          fileData: fileUrl,
          mimeType: 'url',
          fileName: 'Google Drive Link'
        };

        const notes = await getData(STORAGE_KEYS.NOTES);
        notes.push(newNote);
        await saveData(STORAGE_KEYS.NOTES, notes);
        showToast('Personal Note Uploaded Successfully! ✅');
        this.reset();
        document.getElementById('uploadPersonalModal').classList.add('hidden');
        await renderNotes();
      } catch(err) {
        showToast('Storage Error! Failed to upload file. ❌');
        console.error(err);
      }
    });

    async function downloadFile(noteId) {
      const notes = await getData(STORAGE_KEYS.NOTES);
      const note = notes.find(n => n.id === noteId);
      if (!note) return showToast('File not found');

      let src = note.fileData;
      
      // If it's a URL (Google Drive link, etc.)
      if (src && src.startsWith('http')) {
         window.open(src, '_blank');
         return;
      }

      document.getElementById('viewFileTitle').textContent = note.title;
      
      // If it's still a legacy base64 file (before Firebase migration)
      if (src && src.startsWith('data:')) {
          try {
              let arr = src.split(',');
              let mime = arr[0].match(/:(.*?);/)[1];
              let bstr = atob(arr[1]);
              let n = bstr.length;
              let u8arr = new Uint8Array(n);
              while (n--) {
                  u8arr[n] = bstr.charCodeAt(n);
              }
              let blob = new Blob([u8arr], {type: mime});
              src = URL.createObjectURL(blob);
          } catch(e) {
              console.error('Failed to create blob for file viewing', e);
          }
      }
      // If it's a new Firebase Storage URL, it will just load directly into the iframe or prompt download
      
      document.getElementById('viewFileFrame').src = src;
      document.getElementById('viewFileModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
      document.getElementById('viewFileModal').classList.add('hidden');
      document.getElementById('viewFileFrame').src = '';
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const modal = document.getElementById('viewFileModal');
        if (!modal.classList.contains('hidden')) closeViewer();
      }
    });

    async function deletePersonalNote(noteId) {
      if(!confirm('Are you sure you want to delete your personal note?')) return;
      let notes = await getData(STORAGE_KEYS.NOTES);
      notes = notes.filter(n => n.id !== noteId);
      await saveData(STORAGE_KEYS.NOTES, notes);
      showToast('Personal Note Deleted 🗑️');
      
      if (!document.getElementById('searchResultsView').classList.contains('hidden')) {
          await handleSearch();
      } else {
          await renderNotes();
      }
    }

    async function renderSubjectReminders(subject) {
      const area = document.getElementById('subjectRemindersArea');
      const allReminders = await getData(STORAGE_KEYS.REMINDERS);
      const reminders = allReminders.filter(r => r.subject === subject);

      if (reminders.length === 0) {
        area.innerHTML = '';
        return;
      }

      const typeConfig = {
        'Quiz':       { color: '#6C63FF', bg: 'rgba(108,99,255,0.12)', emoji: '📝' },
        'Assignment': { color: '#FF6584', bg: 'rgba(255,101,132,0.12)', emoji: '📋' },
        'Project':    { color: '#00E676', bg: 'rgba(0,230,118,0.12)',   emoji: '🚀' }
      };

      let html = '<div style="background: rgba(255,255,255,0.03); border-radius: 14px; padding: 18px 20px; margin-top: 15px; margin-bottom: 5px;">';
      html += '<h3 style="margin: 0 0 14px 0; font-size: 1rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;">⏱️ Upcoming Deadlines</h3>';
      html += '<div style="display: flex; flex-direction: column; gap: 10px;" id="subjectCountdowns">';

      reminders.forEach((r, idx) => {
        const cfg = typeConfig[r.type] || { color: '#aaa', bg: 'rgba(255,255,255,0.06)', emoji: '🔔' };
        html += `
          <div style="background: ${cfg.bg}; border-left: 4px solid ${cfg.color}; padding: 12px 16px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <div>
              <span style="font-size: 1.3rem;">${cfg.emoji}</span>
              <strong style="color: ${cfg.color}; margin-left: 6px;">${r.type}:</strong>
              <span style="font-size: 1rem; margin-left: 4px;">${r.topic}</span>
            </div>
            <div style="font-family: 'Inter', monospace; font-size: 0.95rem; color: ${cfg.color}; font-weight: 700; padding: 6px 12px; background: rgba(0,0,0,0.3); border-radius: 8px;" id="subj-cd-${idx}" data-deadline="${r.deadline}">
              Calculating...
            </div>
          </div>
        `;
      });

      html += '</div></div>';
      area.innerHTML = html;
    }

    function startCountdowns() {
      setInterval(() => {
          const subjectEls = document.querySelectorAll('[id^="subj-cd-"]');
          const now = Date.now();
          
          subjectEls.forEach(el => {
              const deadline = parseInt(el.getAttribute('data-deadline'), 10);
              const diff = deadline - now;
              
              if (diff <= 0) {
                  el.textContent = '⏰ Expired';
                  el.style.color = 'var(--danger)';
              } else {
                  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                  const s = Math.floor((diff % (1000 * 60)) / 1000);
                  
                  let txt = '';
                  if(d > 0) txt += `${d}d `;
                  if(h > 0 || d > 0) txt += `${h}h `;
                  if(m > 0 || h > 0 || d > 0) txt += `${m}m `;
                  txt += `${s}s left`;
                  
                  el.textContent = txt;
              }
          });
      }, 1000);
    }

    renderAnnouncements();
    renderSubjects();
    startCountdowns();
  </script>
</body>
</html>
